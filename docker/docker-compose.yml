# Note: Airflow runs directly on Codespace (pip installed)
# See scripts/start_airflow.sh to start it

services:
  postgres:
    image: postgres:15
    container_name: f1_postgres
    environment:
      POSTGRES_USER: f1user
      POSTGRES_PASSWORD: f1password
      POSTGRES_DB: f1_warehouse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: f1_minio
    environment:
      MINIO_ROOT_USER: f1minio
      MINIO_ROOT_PASSWORD: f1minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  spark-master:
    image: apache/spark:3.5.0
    container_name: f1_spark_master
    entrypoint: /opt/spark/bin/spark-class
    command: org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8082:8080"
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.0
    container_name: f1_spark_worker
    entrypoint: /opt/spark/bin/spark-class
    command: org.apache.spark.deploy.worker.Worker spark://f1_spark_master:7077
    environment:
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
