name: 'f1_gold'
version: '1.0.0'
config-version: 2

profile: 'f1_gold'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  f1_gold:
    +file_format: parquet
    staging:
      +materialized: view
      +schema: silver
    marts:
      core:
        +materialized: table
        +schema: gold
        +file_format: parquet
      analytics:
        +materialized: table
        +schema: gold
        +file_format: parquet
