version: 2

models:
  - name: fact_race_results
    description: "Core fact table — one row per driver per race"
    columns:
      - name: result_id
        description: "Unique result identifier"
        tests:
          - unique
          - not_null
      - name: driver_id
        tests:
          - not_null
      - name: season
        tests:
          - not_null
      - name: points
        description: "Points scored. NULL for races that have qualifying data but haven't been run yet — see the FULL OUTER JOIN note in fact_race_results.sql. The not_null test below is scoped to only rows where finish_position is set, i.e. the race has actually happened."
        tests:
          - not_null:
              config:
                where: "finish_position is not null"

  - name: dim_drivers
    description: "Driver dimension table"
    columns:
      - name: driver_id
        tests:
          - unique
          - not_null
      - name: full_name
        tests:
          - not_null

  - name: dim_races
    description: "Race dimension table"
    columns:
      - name: race_id
        tests:
          - unique
          - not_null
      - name: season
        tests:
          - not_null

  - name: dim_circuits
    description: "Circuit dimension table"
    columns:
      - name: circuit_id
        tests:
          - unique
          - not_null